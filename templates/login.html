<!DOCTYPE html>
<html>
<head>
    <title>PetShop ERP Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body style="background:#f5f7fb; display:flex; justify-content:center; align-items:center; height:100vh;">

    <div style="display:flex; width:900px; background:white; border-radius:20px; overflow:hidden; box-shadow:0 10px 25px rgba(0,0,0,0.08);">

        <div style="flex:1; background:linear-gradient(135deg,#0f172a,#1e293b); color:white; padding:50px; display:flex; flex-direction:column; justify-content:center;">

            <h1 style="font-size:34px; margin-bottom:15px;">PetShop ERP</h1>

            <p style="font-size:16px; line-height:1.7; color:#cbd5e1;">
                Inventory management system for pet shop operations, customer records, sales tracking and grooming appointments.
            </p>

        </div>

        <div style="flex:1; padding:50px;">

            <h2 style="margin-bottom:25px;">Login</h2>

            <form method="POST" style="box-shadow:none; padding:0; margin:0;">

                <input type="text" name="username" placeholder="Username" required>

                <input type="password" name="password" placeholder="Password" required>

                <button type="submit">Sign In</button>

            </form>

        </div>

    </div>

</body>
</html>
