{% extends "base.html" %}
{% block content %}

<h2>Edit Product</h2>

<form method="POST">

    <input name="name" value="{{ product['name'] }}" required>

    <input name="category" value="{{ product['category'] }}" required>

    <input name="supplier" value="{{ product['supplier'] }}" required>

    <input name="price" value="{{ product['price'] }}" required>

    <input name="stock" value="{{ product['stock'] }}" required>

    <button type="submit">Save</button>

</form>

{% endblock %}
